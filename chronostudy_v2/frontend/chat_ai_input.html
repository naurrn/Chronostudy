<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>ChronoStudy — Buat Jadwal via Chat</title>
<script src="js/api.js"></script>
<style>
  body { font-family: system-ui, sans-serif; max-width: 640px; margin: 40px auto; padding: 0 16px; background: #f7f7fb; }
  h1 { font-size: 1.3rem; }
  #chat-box { background: #fff; border: 1px solid #ddd; border-radius: 12px; padding: 16px; height: 420px; overflow-y: auto; margin-bottom: 12px; }
  .msg { margin: 8px 0; padding: 10px 14px; border-radius: 14px; max-width: 80%; line-height: 1.4; white-space: pre-wrap; }
  .msg.user { background: #4f46e5; color: #fff; margin-left: auto; border-bottom-right-radius: 4px; }
  .msg.bot { background: #eef0f6; color: #222; margin-right: auto; border-bottom-left-radius: 4px; }
  .msg.system { background: #fff7d6; color: #7a5c00; font-size: 0.85rem; text-align: center; max-width: 100%; }
  form { display: flex; gap: 8px; }
  input[type=text] { flex: 1; padding: 10px 12px; border-radius: 8px; border: 1px solid #ccc; }
  button { padding: 10px 18px; border-radius: 8px; border: none; background: #4f46e5; color: #fff; cursor: pointer; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  #reset-btn { background: transparent; color: #4f46e5; text-decoration: underline; padding: 4px; font-size: 0.85rem; }
  .lihat-jadwal-btn {
    display: inline-block; margin-top: 8px; background: #16a34a; color: #fff;
    padding: 10px 20px; border-radius: 8px; text-decoration: none;
    font-weight: 600; font-size: 0.9rem;
  }
</style>
</head>
<body>

<h1>💬 Buat Jadwal Belajar via Chat</h1>
<p style="color:#666; font-size:0.9rem;">
  Ngobrol aja santai — ceritain mata kuliah apa yang mau dijadwalkan, seberapa berat masing-masing,
  dan kapan kamu biasanya bisa belajar. Nanti jadwalnya dibikinin otomatis.
</p>

<div id="chat-box"></div>

<form id="chat-form">
  <input type="text" id="chat-input" placeholder="Ketik pesan..." autocomplete="off" required />
  <button type="submit" id="send-btn">Kirim</button>
</form>
<button id="reset-btn" type="button">↺ Mulai obrolan baru</button>

<script>
const chatBox = document.getElementById("chat-box");
const form = document.getElementById("chat-form");
const input = document.getElementById("chat-input");
const sendBtn = document.getElementById("send-btn");
const resetBtn = document.getElementById("reset-btn");

function addMsg(text, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.textContent = text;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

// Sama seperti addMsg, tapi boleh nyisipin HTML (dipakai buat tombol "Lihat Jadwal")
function addMsgHTML(html, cls) {
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.innerHTML = html;
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

// Sapaan awal
addMsg("Halo! Cerita dong, mata kuliah apa aja yang mau dijadwalkan minggu ini?", "bot");

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const pesan = input.value.trim();
  if (!pesan) return;

  addMsg(pesan, "user");
  input.value = "";
  sendBtn.disabled = true;

  try {
    const res = await apiJSON("/api/chat/ai-input", {
      method: "POST",
      body: JSON.stringify({ message: pesan }),
    });
    addMsg(res.reply, "bot");
    if (res.selesai && res.jadwal) {
      addMsgHTML(
        `✅ Jadwal berhasil dibuat & disimpan!<br>` +
        `<a class="lihat-jadwal-btn" href="result.html?id=${res.jadwal.hasil_id}">Lihat Jadwal →</a>`,
        "system"
      );
    }
  } catch (err) {
    addMsg("Error: " + err.message, "system");
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
});

resetBtn.addEventListener("click", async () => {
  try {
    await apiJSON("/api/chat/ai-input/reset", { method: "POST" });
    chatBox.innerHTML = "";
    addMsg("Oke, obrolan baru dimulai. Cerita lagi dong, mau jadwalin mata kuliah apa aja?", "bot");
  } catch (err) {
    addMsg("Error reset: " + err.message, "system");
  }
});
</script>

</body>
</html>
